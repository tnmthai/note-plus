<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #ccc; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    #toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #2d2d2d; border-bottom: 1px solid #3c3c3c; flex-shrink: 0; z-index: 10; }
    #toolbar .title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 500px; }
    #toolbar .info { font-size: 12px; color: #969696; }
    #toolbar button { background: #3c3c3c; border: none; color: #ccc; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    #toolbar button:hover { background: #505050; }
    .zoom-controls { display: flex; align-items: center; gap: 8px; }
    .zoom-controls span { font-size: 13px; min-width: 50px; text-align: center; }
    #content { flex: 1; overflow: hidden; position: relative; }
    #pdf-frame { width: 100%; height: 100%; border: none; }
    #docx-scroll { width: 100%; height: 100%; overflow-y: auto; padding: 20px; display: flex; justify-content: center; }
    #docx-scroll::-webkit-scrollbar { width: 8px; }
    #docx-scroll::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    .docx-content { background: white; color: #333; padding: 40px 60px; max-width: 800px; width: 100%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); line-height: 1.6; font-size: 14px; }
    .docx-content h1 { font-size: 24px; margin: 16px 0 8px; }
    .docx-content h2 { font-size: 20px; margin: 14px 0 6px; }
    .docx-content h3 { font-size: 16px; margin: 12px 0 4px; }
    .docx-content p { margin: 8px 0; }
    .docx-content ul, .docx-content ol { margin: 8px 0 8px 24px; }
    .docx-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .docx-content th, .docx-content td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    .docx-content th { background: #f0f0f0; }
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #969696; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #3c3c3c; border-top: 3px solid #007acc; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f44747; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="doc-title" class="title">Document</span>
    <div class="zoom-controls" id="zoom-controls" style="display:none;">
      <button id="zoom-out">-</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in">+</button>
    </div>
    <span id="doc-info" class="info"></span>
  </div>
  <div id="content">
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading document...</span>
    </div>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var filePath = params.get('file');
    var docType = params.get('type');
    document.getElementById('doc-title').textContent = params.get('title') || filePath;

    // PDF: load in iframe
    if (docType === 'pdf') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('zoom-controls').style.display = 'none';
      document.getElementById('doc-info').textContent = 'PDF Document (read-only)';
      var content = document.getElementById('content');
      var iframe = document.createElement('iframe');
      iframe.id = 'pdf-frame';
      iframe.src = 'file:///' + filePath.replace(/\\/g, '/');
      content.appendChild(iframe);
    }

    // DOCX: render via mammoth in browser
    if (docType === 'docx') {
      document.getElementById('doc-info').textContent = 'DOCX Document';
      window.api.onDocumentRendered(function(data) {
        document.getElementById('loading').style.display = 'none';
        if (data.error) {
          document.getElementById('content').innerHTML = '<div class="error">Error: ' + data.error + '</div>';
          return;
        }
        if (data.type === 'docx') {
          var scroll = document.getElementById('content');
          scroll.id = 'docx-scroll';
          scroll.innerHTML = '';
          var div = document.createElement('div');
          div.className = 'docx-content';
          div.innerHTML = data.html;
          scroll.appendChild(div);
        }
      });
      window.api.renderDocument(filePath, docType);
    }
  </script>
</body>
</html>
